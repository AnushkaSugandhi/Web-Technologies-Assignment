<html>
    <body align="center" bgcolor="cyan">
        <h3>JOB REGISTRATION FORM</h3>
        <form>
            NAME: <input type="text" placeholder="name" id="N" ><br><br>
            EMAIL: <input type="email" placeholder="email" id="E" ><br><br>
            PHONE: <input type="number" placeholder="phone" id="P" ><br><br>
            <input type="submit" value="Register" onclick="return validate()">
        </form>
        <script>
            function validate() {
            var a = document.getElementById("N");
            var b = document.getElementById("E");
            var c = document.getElementById("P");

            var p = a.value;
            var q = b.value;
            var r = c.value;

            var x = /^[a-zA-Z]+[0-9a-zA-Z._]*$/;
            var y = /^[a-zA-Z]+([\._]?\w+)*@\w+([\._]?\w+)*(\.\w{2,3})+$/;
            var z = /^[6-9][0-9]{9}$/;

        if (x.test(p)) {
            if (y.test(q)) {
                if (z.test(r)) {
                    alert("Registration Successful");
                    return true;
                } 
                else {
                    return error(c);
                }
            }
            else {
                return error(b);
            }  
        } 
        else {
            return error(a);
        }   
    } 


function error(ele) {
    alert("Invalid ");
    ele.style.border = "3px solid red";
    ele.value = "";
    ele.placeholder = "invalid";
    ele.focus();
    return false;
}
        </script>

</html>
